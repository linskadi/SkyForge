component: arinc429_label_parser
version: 1.0.0
safety_level: DAL-A
traceability: [REQ-001]
interface:
  inputs:
    - name: word
      type: uint32_t
      range: [0, 4294967295]
  outputs:
    - name: error_code
      type: int32_t
      range: [-1, 0]
    - name: label
      type: uint8_t
      range: [0, 255]
    - name: sdi
      type: uint8_t
      range: [0, 3]
    - name: data
      type: uint32_t
      range: [0, 524287]
    - name: ssm
      type: uint8_t
      range: [0, 3]
    - name: parity_bit
      type: uint8_t
      range: [0, 1]
    - name: parity_error_flag
      type: bool
      range: [0, 1]
contracts:
  preconditions:
    - "parsed != NULL"
  postconditions:
    - "(popcount(word) % 2 == 1) ? (error_code == 0 && parity_error_flag == false) : (error_code == -1 && parity_error_flag == true)"
    - "label == (word & 0xFF)"
    - "sdi == ((word >> 8) & 0x03)"
    - "data == ((word >> 10) & 0x7FFFF)"
    - "ssm == ((word >> 29) & 0x03)"
    - "parity_bit == ((word >> 31) & 0x01)"
  invariants:
    - "sample_rate == 100Hz"
  fault_handling:
    - "if parity check fails: set parity_error_flag = true and return -1"