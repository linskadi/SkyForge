# docker-compose.yml - 生产环境

services:
  redis:
    image: redis:alpine
    container_name: skyforge_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-skyforge_secure_password} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-skyforge_secure_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - skyforge_network

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: skyforge_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./config/.env.prod
    environment:
      - ENV=PROD
      - REDIS_URL=redis://:${REDIS_PASSWORD:-skyforge_secure_password}@redis:6379/0
    volumes:
      - ./project/work_dir:/app/project/work_dir
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - skyforge_network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skyforge_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - skyforge_network

networks:
  skyforge_network:
    driver: bridge

volumes:
  redis_data:
