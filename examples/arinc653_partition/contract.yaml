# ARINC 653 分区调度器形式化契约
# 符合 SkyForge 契约规范 (component / interface / preconditions / postconditions / invariants / fault_handling)
# 标准依据: ARINC 653 Part 1, DO-178C DAL-A, MISRA-C:2012
component: Arinc653PartitionScheduler
version: "1.0.0"
description: >-
  ARINC 653 分区调度器，在主时间帧 (MTF = 200ms) 内按预定时间片
  (P1=50ms, P2=80ms, P3=70ms) 调度三个航空分区 (Display / Navigation / Health Monitoring)，
  支持严格周期性调度、上下文切换 (<1ms)、超时健康监控与故障隔离。
safety_level: DAL-A
assumptions:
  - "系统时钟 tick 频率为 1 kHz (1 tick = 1 ms)"
  - "MMU/MPU 已正确配置各分区的内存访问权限"
  - "Partition_HM_Handler 由调度器同步调用，不会重入"
  - "硬件看门狗已启用，超时 500 ms 触发系统复位"

interface:
  inputs:
    - name: partition_id
      type: uint8_t
      range: [1, 3]
      description: "分区标识: 1=Display, 2=Navigation, 3=Health Monitoring"
    - name: command
      type: uint8_t
      range: [0, 4]
      description: "控制命令: 0=CREATE, 1=START, 2=STOP, 3=HM_REPORT, 4=QUERY_STATE"
    - name: mtf_tick
      type: uint32_t
      range: [0, 4294967295]
      unit: ms
      description: "系统主时间帧 tick 计数 (1 tick = 1 ms)"

  outputs:
    - name: partition_state
      type: uint8_t
      range: [0, 4]
      description: "分区状态: 0=IDLE, 1=RUNNABLE, 2=RUNNING, 3=BLOCKED, 4=TERMINATED"
    - name: result_code
      type: uint8_t
      range: [0, 3]
      description: "操作结果: 0=OK, 1=INVALID_PARAM, 2=NO_RESOURCE, 3=TIMEOUT"
    - name: hm_handler_event
      type: uint8_t
      range: [0, 3]
      description: "健康监控事件: 0=NONE, 1=OVERRUN, 2=STACK_FAULT, 3=FATAL"

preconditions:
  - id: CON-A653-PRE-000
    expression: "partition_id >= 1 && partition_id <= 3"
    description: "分区 ID 必须在有效范围 [1, 3] 内"
  - id: CON-A653-PRE-001
    expression: "command >= 0 && command <= 4"
    description: "控制命令必须在有效枚举范围内"
  - id: CON-A653-PRE-002
    expression: "mtf_tick >= 0"
    description: "MTF tick 计数为非负整数"
  - id: CON-A653-PRE-003
    expression: "partition_period_ms == 200"
    description: "主时间帧周期固定为 200 ms (配置期约束)"

postconditions:
  - id: CON-A653-POST-000
    expression: "partition_state >= 0 && partition_state <= 4"
    description: "分区状态必须在有效枚举范围内"
  - id: CON-A653-POST-001
    expression: "result_code >= 0 && result_code <= 3"
    description: "结果码必须在有效范围内"
  - id: CON-A653-POST-002
    expression: "context_switch_duration_ms <= 1.0"
    description: "分区上下文切换耗时 ≤ 1 ms"
  - id: CON-A653-POST-003
    expression: "sum(time_slice_ms) == partition_period_ms"
    description: "各分区时间片之和必须等于 MTF 周期 (200 ms)"

invariants:
  - id: CON-A653-INV-000
    expression: "partition_period_ms == 200"
    description: "主时间帧周期固定为 200 ms，运行时不可修改"
  - id: CON-A653-INV-001
    expression: "time_slice_p1_ms == 50 && time_slice_p2_ms == 80 && time_slice_p3_ms == 70"
    description: "时间片分配: P1=50ms, P2=80ms, P3=70ms (总和=200ms)"
  - id: CON-A653-INV-002
    expression: "time_slice_p1_ms + time_slice_p2_ms + time_slice_p3_ms == partition_period_ms"
    description: "时间片守恒约束: 总和等于 MTF 周期"
  - id: CON-A653-INV-003
    expression: "context_switch_duration_ms <= 1.0"
    description: "上下文切换耗时上限: 1 ms"
  - id: CON-A653-INV-004
    expression: "scheduler_jitter_us <= 100"
    description: "调度抖动 ≤ 100 μs (严格周期性)"
  - id: CON-A653-INV-005
    expression: "no_priority_inversion == true"
    description: "调度策略保证无优先级反转 (固定优先级 + 时间片)"
  - id: CON-A653-INV-006
    expression: "num_partitions == 3"
    description: "分区数量固定为 3 (Display / Navigation / Health Monitoring)"

fault_handling:
  - id: CON-A653-FLT-000
    expression: "if partition_overrun then trigger Partition_HM_Handler(OVERRUN)"
    description: "分区超时 (Overrun) 触发 Partition_HM_Handler，事件码=1"
  - id: CON-A653-FLT-001
    expression: "if partition_overrun then partition_state := TERMINATED"
    description: "超时分区的状态被置为 TERMINATED，本 MTF 内不再调度"
  - id: CON-A653-FLT-002
    expression: "if hm_handler_event == FATAL then enter SAFE_STATE"
    description: "致命故障时进入 SAFE_STATE，停止所有分区执行"
  - id: CON-A653-FLT-003
    expression: "if mmu_violation then trigger Partition_HM_Handler(STACK_FAULT)"
    description: "MMU 内存访问违例触发 STACK_FAULT 事件"
  - id: CON-A653-FLT-004
    expression: "if watchdog_timeout then system_reset"
    description: "硬件看门狗超时 (500ms) 触发系统复位"
